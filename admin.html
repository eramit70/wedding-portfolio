<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Deepak & Reshmi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tangerine:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-login { max-width: 450px; margin: 100px auto; padding: 40px; text-align: center; }
        .admin-dashboard { display: none; padding: 40px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 10; }
        .admin-nav { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; border-bottom: 2px solid var(--primary); -webkit-overflow-scrolling: touch; }
        .tab-btn { padding: 12px 25px; border: none; background: #eee; cursor: pointer; border-radius: 12px 12px 0 0; font-weight: 600; color: var(--primary); transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.95rem; color: var(--primary); }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-family: inherit; font-size: 1rem; }
        .item-card { border: 2px solid #eee; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; background: white; margin-bottom: 10px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .val-info { font-size: 0.75rem; color: var(--secondary); margin-top: 5px; font-weight: 600; }
    </style>
</head>
<body class="admin-view" style="background:#FDF5E6;">

    <div id="login-container" class="admin-login">
        <div class="glass-card login-card animate-up">
            <h2 class="serif" style="color:var(--primary);">Admin Login</h2>
            <form id="login-form">
                <input type="password" id="admin-pass" placeholder="Password" required style="width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 15px; text-align: center;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="margin-top:20px;"><a href="index.html" style="color:var(--secondary); text-decoration: none;">Back to Website</a></p>
        </div>
    </div>

    <div id="dashboard-container" class="admin-dashboard">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1 class="serif" style="color:var(--primary); margin: 0;">Wedding Settings</h1>
                <button class="btn btn-outline" onclick="location.reload()">Logout</button>
            </div>

            <nav class="admin-nav">
                <button class="tab-btn active" data-tab="general">General</button>
                <button class="tab-btn" data-tab="couple">Couple</button>
                <button class="tab-btn" data-tab="events">Events</button>
                <button class="tab-btn" data-tab="gallery">Gallery</button>
                <button class="tab-btn" data-tab="wishes">Wishes</button>
            </nav>

            <div id="general" class="tab-content active">
                <form id="form-general">
                    <div class="form-group"><label>Wedding Title</label><input type="text" id="admin-title"></div>
                    <div class="form-group"><label>Event Date Text</label><input type="text" id="admin-date-text"></div>
                    <div class="form-group"><label>YouTube Video URL</label><input type="text" id="admin-video-url"></div>
                    <div class="form-group"><label>Music URL</label><input type="text" id="admin-music-url"></div>
                    <div class="form-group"><label>Hero Image URL</label><input type="text" id="admin-hero-url"></div>
                    <div class="form-group"><label>Or Upload New Hero</label><input type="file" id="upload-hero" accept="image/*"></div>
                    <button type="submit" class="btn btn-primary">Save General Settings</button>
                </form>
            </div>

            <div id="couple" class="tab-content">
                <form id="form-couple">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <h4>Groom</h4>
                            <div class="form-group"><label>Name</label><input type="text" id="admin-groom-name"></div>
                            <div class="form-group"><label>Parents</label><input type="text" id="admin-groom-parents"></div>
                            <div class="form-group"><label>Residence</label><textarea id="admin-groom-res"></textarea></div>
                            <div class="form-group"><label>Upload Photo</label><input type="file" id="upload-groom" accept="image/*"></div>
                        </div>
                        <div>
                            <h4>Bride</h4>
                            <div class="form-group"><label>Name</label><input type="text" id="admin-bride-name"></div>
                            <div class="form-group"><label>Parents</label><input type="text" id="admin-bride-parents"></div>
                            <div class="form-group"><label>Residence</label><textarea id="admin-bride-res"></textarea></div>
                            <div class="form-group"><label>Upload Photo</label><input type="file" id="upload-bride" accept="image/*"></div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top:20px;">Save Couple Details</button>
                </form>
            </div>

            <div id="events" class="tab-content">
                <h3>Events</h3>
                <div id="admin-event-list"></div>
                <hr style="margin:25px 0; opacity:0.1;">
                <h4>Add Event</h4>
                <form id="form-event-add">
                    <div class="form-group"><input type="text" id="add-ev-title" placeholder="Event Title"></div>
                    <div class="form-group"><input type="text" id="add-ev-day" placeholder="Day (e.g. 23)"></div>
                    <div class="form-group"><input type="text" id="add-ev-time" placeholder="Time"></div>
                    <div class="form-group"><input type="text" id="add-ev-venue" placeholder="Venue"></div>
                    <button type="submit" class="btn btn-primary btn-sm">Add & Save</button>
                </form>
            </div>

            <div id="gallery" class="tab-content">
                <h3>Our Journey Gallery</h3>
                <div class="glass-card" style="padding:20px; margin-bottom:20px; text-align:center;">
                    <label class="btn btn-primary btn-sm" style="display:inline-block; margin-bottom:10px; cursor:pointer;">
                        <i class="fa-solid fa-plus"></i> Select Multiple Photos
                        <input type="file" id="gallery-uploader" accept="image/*" multiple style="display:none;" onchange="uploadToGallery()">
                    </label>
                    <p class="val-info">Tip: Selected photos will upload and save automatically.</p>
                </div>
                <div id="admin-gallery-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:15px;">
                    <!-- Gallery items will appear here -->
                </div>
            </div>

            <div id="wishes" class="tab-content">
                <h3>Manage Guest Wishes</h3>
                <h4>Pending Approval</h4>
                <div id="admin-wishes-pending" class="card-list"></div>
                <hr style="margin:25px 0; opacity:0.1;">
                <h4>Approved & Live</h4>
                <div id="admin-wishes-approved" class="card-list"></div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
